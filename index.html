<!DOCTYPE html>
<html lang="ug">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esra Izda</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f6f9;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 16px;
        }

        /* 主容器 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 16px;
        }

        /* 品牌名 */
        .brand {
            font-size: 28px;
            font-weight: 600;
            color: #1a73e8;
            letter-spacing: 1px;
            margin-bottom: 8px;
            direction: rtl;
        }
        .brand small {
            font-size: 16px;
            font-weight: 400;
            color: #5f6368;
        }

        /* 圆形搜索框 */
        .circle-input {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid #dadce0;
            background: #ffffff;
            text-align: center;
            font-size: 20px;
            padding: 0 20px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #202124;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
        }
        .circle-input::placeholder {
            color: #9aa0a6;
            font-size: 16px;
            text-align: center;
        }

        /* 按钮行（搜索 + 图片切换） */
        .action-row {
            display: flex;
            gap: 24px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .circle-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #1a73e8;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-btn:hover {
            background: #1557b0;
        }
        .circle-btn:active {
            transform: scale(0.94);
        }
        .circle-btn.outline {
            background: transparent;
            border: 2px solid #dadce0;
            color: #5f6368;
        }
        .circle-btn.outline:hover {
            background: #f1f3f4;
        }
        .circle-btn.active {
            background: #e8f0fe;
            border-color: #1a73e8;
            color: #1a73e8;
        }

        /* 功能按钮（收藏 + 记录） */
        .func-row {
            display: flex;
            gap: 20px;
            margin-top: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .func-btn {
            background: none;
            border: none;
            font-size: 14px;
            color: #5f6368;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            transition: background 0.2s;
            direction: rtl;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .func-btn:hover {
            background: #e8eaed;
        }
        .func-btn .badge {
            background: #1a73e8;
            color: #fff;
            border-radius: 12px;
            padding: 0 8px;
            font-size: 12px;
            line-height: 18px;
        }

        /* 下拉面板（记录/收藏） */
        .panel {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 12px 16px;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            direction: rtl;
            text-align: right;
        }
        .panel.open {
            display: block;
        }
        .panel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #f1f3f4;
            font-size: 15px;
            color: #202124;
        }
        .panel-item:last-child {
            border-bottom: none;
        }
        .panel-item .del {
            color: #d93025;
            cursor: pointer;
            font-size: 14px;
            background: none;
            border: none;
        }
        .panel-item .del:hover {
            text-decoration: underline;
        }
        .panel-empty {
            color: #9aa0a6;
            text-align: center;
            padding: 16px 0;
            font-size: 14px;
        }
        .panel-title {
            font-weight: 600;
            color: #202124;
            margin-bottom: 8px;
            font-size: 16px;
        }

        /* 图片搜索开关状态 */
        .img-mode-hint {
            font-size: 13px;
            color: #1a73e8;
            background: #e8f0fe;
            padding: 2px 12px;
            border-radius: 30px;
            display: none;
            direction: rtl;
        }
        .img-mode-hint.show {
            display: inline-block;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .circle-input {
                width: 140px;
                height: 140px;
                font-size: 16px;
            }
            .circle-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            .brand {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 品牌 -->
    <div class="brand">Esra Izda <small>ئىزدەش</small></div>

    <!-- 圆形搜索框 -->
    <input type="text" class="circle-input" id="searchInput" placeholder="ئىزدەش" dir="rtl" />

    <!-- 操作按钮：搜索 + 图片切换 -->
    <div class="action-row">
        <button class="circle-btn" id="searchBtn" title="ئىزدەش">🔍</button>
        <button class="circle-btn outline" id="imgToggleBtn" title="رەسىم ئىزدەش">🖼️</button>
    </div>

    <!-- 图片模式提示 -->
    <div class="img-mode-hint" id="imgHint">🖼️ رەسىم ئىزدەش ھالىتى</div>

    <!-- 功能按钮：收藏 + 搜索记录 -->
    <div class="func-row">
        <button class="func-btn" id="favBtn">⭐ <span id="favCount" class="badge">0</span></button>
        <button class="func-btn" id="historyBtn">📋 <span id="historyCount" class="badge">0</span></button>
    </div>

    <!-- 面板：显示收藏或记录 -->
    <div class="panel" id="panel">
        <div class="panel-title" id="panelTitle">خاتىرە</div>
        <div id="panelContent">
            <div class="panel-empty">ھېچنېمە يوق</div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ----- DOM 元素 -----
        const input = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const imgToggleBtn = document.getElementById('imgToggleBtn');
        const imgHint = document.getElementById('imgHint');
        const favBtn = document.getElementById('favBtn');
        const historyBtn = document.getElementById('historyBtn');
        const panel = document.getElementById('panel');
        const panelTitle = document.getElementById('panelTitle');
        const panelContent = document.getElementById('panelContent');
        const favCountSpan = document.getElementById('favCount');
        const historyCountSpan = document.getElementById('historyCount');

        // ----- 状态 -----
        let isImageMode = false;          // 图片搜索模式
        let currentPanelType = null;      // 'fav' 或 'history'

        // ----- 数据存储（localStorage）-----
        function getFavs() {
            try {
                return JSON.parse(localStorage.getItem('esra_favs')) || [];
            } catch { return []; }
        }
        function setFavs(arr) {
            localStorage.setItem('esra_favs', JSON.stringify(arr));
        }
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('esra_history')) || [];
            } catch { return []; }
        }
        function setHistory(arr) {
            localStorage.setItem('esra_history', JSON.stringify(arr));
        }

        // 添加搜索记录（去重，最多50条）
        function addHistory(query) {
            if (!query.trim()) return;
            let hist = getHistory();
            hist = hist.filter(item => item !== query);
            hist.unshift(query);
            if (hist.length > 50) hist = hist.slice(0, 50);
            setHistory(hist);
            updateBadges();
        }

        // 切换收藏
        function toggleFav(query) {
            if (!query.trim()) return;
            let favs = getFavs();
            const idx = favs.indexOf(query);
            if (idx > -1) {
                favs.splice(idx, 1);
            } else {
                favs.unshift(query);
            }
            setFavs(favs);
            updateBadges();
            // 如果当前打开的是收藏面板，刷新显示
            if (currentPanelType === 'fav') renderPanel('fav');
        }

        // 删除单项（收藏或记录）
        function removeItem(type, query) {
            if (type === 'fav') {
                let favs = getFavs().filter(item => item !== query);
                setFavs(favs);
            } else if (type === 'history') {
                let hist = getHistory().filter(item => item !== query);
                setHistory(hist);
            }
            updateBadges();
            if (currentPanelType === type) renderPanel(type);
        }

        // 清空（收藏或记录）
        function clearAll(type) {
            if (type === 'fav') {
                setFavs([]);
            } else if (type === 'history') {
                setHistory([]);
            }
            updateBadges();
            if (currentPanelType === type) renderPanel(type);
        }

        // 更新角标
        function updateBadges() {
            const favs = getFavs();
            const hist = getHistory();
            favCountSpan.textContent = favs.length;
            historyCountSpan.textContent = hist.length;
        }

        // ----- 渲染面板 -----
        function renderPanel(type) {
            const data = type === 'fav' ? getFavs() : getHistory();
            const title = type === 'fav' ? '⭐ ياقتۇرغانلار' : '📋 ئىزدەش خاتىرىسى';
            panelTitle.textContent = title;
            currentPanelType = type;

            if (data.length === 0) {
                panelContent.innerHTML = `<div class="panel-empty">ھېچنېمە يوق</div>`;
                return;
            }

            let html = '';
            // 添加“清除全部”按钮
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                        <span></span>
                        <button class="func-btn" style="color:#d93025; font-size:13px;" id="clearAllBtn">ھەممىنى ئۆچۈر</button>
                    </div>`;
            data.forEach((item, index) => {
                html += `<div class="panel-item">
                            <span>${escapeHtml(item)}</span>
                            <div>
                                <button class="del" data-type="${type}" data-value="${escapeHtml(item)}">✕</button>
                            </div>
                        </div>`;
            });
            panelContent.innerHTML = html;

            // 绑定删除事件
            document.querySelectorAll('.panel-item .del').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const val = this.getAttribute('data-value');
                    const t = this.getAttribute('data-type');
                    removeItem(t, val);
                });
            });

            // 绑定清空事件
            const clearBtn = document.getElementById('clearAllBtn');
            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    if (confirm('راستىنلا ھەممىنى ئۆچۈرەمسىز؟')) {
                        clearAll(type);
                    }
                });
            }
        }

        // 简单防XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 打开/关闭面板
        function togglePanel(type) {
            if (currentPanelType === type && panel.classList.contains('open')) {
                panel.classList.remove('open');
                currentPanelType = null;
                return;
            }
            renderPanel(type);
            panel.classList.add('open');
        }

        // 关闭面板（点击别处时）
        function closePanel() {
            panel.classList.remove('open');
            currentPanelType = null;
        }

        // ----- 执行搜索 -----
        function performSearch() {
            const query = input.value.trim();
            if (!query) {
                alert('ئىزدەش سۆزىنى كىرگۈزۈڭ');
                return;
            }
            // 保存记录
            addHistory(query);

            // 构建搜索URL（使用SearXNG公共实例）
            const baseUrl = 'https://searx.be/search';
            const params = new URLSearchParams();
            params.set('q', query);
            params.set('language', 'ug');  // 维吾尔语
            if (isImageMode) {
                params.set('categories', 'images');  // 图片分类
            }
            const url = baseUrl + '?' + params.toString();
            window.open(url, '_blank');  // 新窗口打开
        }

        // ----- 事件绑定 -----
        searchBtn.addEventListener('click', performSearch);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });

        // 图片切换
        imgToggleBtn.addEventListener('click', function() {
            isImageMode = !isImageMode;
            this.classList.toggle('active', isImageMode);
            imgHint.classList.toggle('show', isImageMode);
            // 修改按钮样式
            if (isImageMode) {
                this.classList.add('active');
                this.style.borderColor = '#1a73e8';
            } else {
                this.classList.remove('active');
                this.style.borderColor = '#dadce0';
            }
        });

        // 收藏按钮：如果输入框有内容，则收藏/取消；否则显示收藏面板
        favBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const query = input.value.trim();
            if (query) {
                toggleFav(query);
                // 提示（简单用alert）
                const favs = getFavs();
                const isFav = favs.includes(query);
                alert(isFav ? '⭐ ياقتۇرغانلارغا قوشۇلدى' : '❌ ياقتۇرغانلاردىن چىقىرىلدى');
                return;
            }
            togglePanel('fav');
        });

        // 历史按钮
        historyBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            togglePanel('history');
        });

        // 点击页面空白处关闭面板
        document.addEventListener('click', function(e) {
            if (!panel.contains(e.target) && e.target !== historyBtn && e.target !== favBtn) {
                closePanel();
            }
        });

        // 初始加载更新角标
        updateBadges();

        // 自动聚焦输入框
        window.addEventListener('load', function() {
            input.focus();
        });

        // 额外：如果用户点击了面板内的项目（搜索词），可以快速填入输入框
        panelContent.addEventListener('click', function(e) {
            const item = e.target.closest('.panel-item');
            if (item) {
                const textSpan = item.querySelector('span');
                if (textSpan) {
                    input.value = textSpan.textContent;
                    closePanel();
                    input.focus();
                }
            }
        });

        // 按住Ctrl+Shift+I 快速切换图片模式（小彩蛋）
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                imgToggleBtn.click();
            }
        });

    })();
</script>

</body>
</html>
